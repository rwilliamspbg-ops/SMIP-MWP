go throughname: Check Generated Files Up-to-date

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  check-generated:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Install elan (official install script)
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      - name: Setup Lean toolchain and generate Lean vectors
        run: |
          # Use explicit elan path
          $HOME/.elan/bin/elan default leanprover/lean4:stable
          $HOME/.elan/bin/lake exe GenerateHKDFVectors

      - name: Generate tests (no-commit)
        run: |
          go run -tags=tools ./tools/leanvecgen

      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Generated files are out of date; please run the generator and commit the results.";
            git --no-pager diff --name-only --porcelain
            exit 1
          fi