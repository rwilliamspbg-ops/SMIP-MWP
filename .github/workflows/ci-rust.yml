name: CI - Rust

on:
  push:
    branches: [ main, "rust-rewrite/*", "perf/*", "*" ]
  pull_request:
    branches: [ main ]

jobs:
  test-afxdp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache cargo registry and target
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Show rustc
        run: rustc --version && cargo --version

      - name: Run tests for afxdp crate
        working-directory: rust_rewrite
        run: |
          cargo test -p afxdp --verbose
