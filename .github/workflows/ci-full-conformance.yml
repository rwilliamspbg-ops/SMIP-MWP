name: CI - Full Conformance

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ formal/phase3-formalization-finish, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan (Lean version manager)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "PATH=$HOME/.elan/bin:$PATH" >> $GITHUB_ENV

      - name: Lake build (Lean)
        working-directory: formal/lean4
        run: lake build

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'

      - name: Run full Go tests
        run: |
          go test ./... -count=1
