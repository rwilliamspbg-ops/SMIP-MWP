name: Benchmarks

on:
  schedule:
    - cron: '0 6 * * 1' # weekly on Monday at 06:00 UTC
  workflow_dispatch: {}

jobs:
  run-benchmarks:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    name: Run small benchmark set and upload artifacts (${{ matrix.os }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run benchmarks (small set)
        run: |
          # run a focused benchmark set to limit runtime
          ./scripts/bench.sh -- go test ./internal/crypto -bench . -benchmem -run ^$ -count=1

      - name: Collect additional benchmarks
        run: |
          ./scripts/bench.sh -- go test ./internal/datapath/afxdp -bench . -benchmem -run ^$ -count=1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smip-mwp-benchmarks-${{ matrix.os }}
          path: benchmarks/
          retention-days: 14
