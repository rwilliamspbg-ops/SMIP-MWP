name: Benchmarks

on:
  schedule:
    - cron: '0 6 * * 1' # weekly on Monday at 06:00 UTC
  workflow_dispatch: {}
  # Temporary: allow running this workflow by pushing to the temporary branch
  # `temp/run-bench-on-push`. This is intended to be short-lived; remove after
  # the manual runs complete.
  push:
    branches:
      - temp/run-bench-on-push

jobs:
  run-benchmarks:
    strategy:
      fail-fast: false
      matrix:
        # Use Linux runners only for benchmarks to avoid platform-specific AF_XDP
        # build issues and to ensure Graphviz (`dot`) is installable.
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    name: Run small benchmark set and upload artifacts (${{ matrix.os }})
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Install system packages (Graphviz)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y graphviz

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run benchmarks (small set)
        run: |
          # run a focused benchmark set to limit runtime
          ./scripts/bench.sh -- go test ./internal/crypto -bench . -benchmem -run ^$ -count=1

      - name: Collect additional benchmarks
        run: |
          ./scripts/bench.sh -- go test ./internal/datapath/afxdp -bench . -benchmem -run ^$ -count=1

      - name: Run benchmarks with pprof (crypto)
        run: |
          # capture CPU/memory profiles for crypto benchmarks
          ./scripts/bench.sh --pprof -- go test ./internal/crypto -bench . -benchmem -run ^$ -count=1

      - name: Run benchmarks with pprof (datapath)
        run: |
          # capture CPU/memory profiles for datapath benchmarks
          ./scripts/bench.sh --pprof -- go test ./internal/datapath/afxdp -bench . -benchmem -run ^$ -count=1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smip-mwp-benchmarks-${{ matrix.os }}-${{ github.run_id }}
          path: |
            benchmarks/**
          retention-days: 14
