name: Lean 4 CI

on:
  push:
    paths:
      - 'formal/lean4/**'
  pull_request:
    paths:
      - 'formal/lean4/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan (official install script)
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      - name: Setup Lean toolchain
        run: |
          elan default leanprover/lean4:stable
      - name: Check lake availability
        run: |
          lake --version
      - name: Build with lake
        working-directory: formal/lean4
        run: |
          lake build
