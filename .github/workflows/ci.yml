name: CI

on:
  push:
    branches: [ main, rust-rewrite/scaffold ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Install Dependencies
        run: go mod download

      - name: Install elan (official install script)
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      - name: Setup Lean toolchain
        run: |
          # Use explicit elan path to avoid PATH races
          $HOME/.elan/bin/elan default leanprover/lean4:stable
      - name: Generate Lean HKDF vectors
        working-directory: formal/lean4
        run: |
          $HOME/.elan/bin/lake exe GenerateHKDFVectors

      - name: Generate tests from Lean vectors
        run: |
          go run -tags=tools ./tools/leanvecgen

      - name: Run tests
        run: go test ./... -v

      - name: Go vet
        run: go vet ./...

  lean:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Install elan (official install script)
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      - name: Setup Lean toolchain
        run: |
          # Use explicit elan path to avoid PATH races
          $HOME/.elan/bin/elan default leanprover/lean4:stable
      - name: Build with lake
        working-directory: formal/lean4
        run: |
          $HOME/.elan/bin/lake build
      - name: Reject proof placeholders
        working-directory: formal/lean4
        run: |
          if grep -Rnw --include='*.lean' -E '\b(sorry|admit|axiom)\b' Lean; then
            echo "Lean proof placeholders are not allowed in CI"
            exit 1
          fi
