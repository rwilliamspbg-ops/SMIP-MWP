name: Generate and Commit Generated Tests

on:
  push:
    branches: [ rust-rewrite/scaffold ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Generate tests
        run: |
          go run -tags=tools ./tools/leanvecgen

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore: update generated test vectors"
            git push
          else
            echo "No generated changes"
          fi